name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop
        run: pnpm --filter @vinylly/desktop build --no-bundle

      - name: Package binary (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          mkdir -p dist
          cp apps/desktop/src-tauri/target/release/vinylly dist/vinylly
          chmod +x dist/vinylly
          cd dist && tar czf ../vinylly-linux-x64.tar.gz vinylly

      - name: Package binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item apps/desktop/src-tauri/target/release/vinylly.exe dist/vinylly.exe
          Compress-Archive -Path dist\vinylly.exe -DestinationPath vinylly-windows-x64.zip

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vinylly-linux-x64.tar.gz
            vinylly-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
