name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_REPOSITORY: ${{ github.repository }}
          BUILD_TIMESTAMP: ${{ github.event.repository.updated_at }}
        run: pnpm --filter @vinylly/web build

  desktop-linux:
    name: Build Desktop (Linux portable)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux portable binary
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_REPOSITORY: ${{ github.repository }}
          BUILD_TIMESTAMP: ${{ github.event.repository.updated_at }}
        run: pnpm --filter @vinylly/desktop build --no-bundle

      - name: Package Linux .tar.gz
        run: |
          mkdir -p release/vinylly-linux-x64
          cp apps/desktop/src-tauri/target/release/vinylly release/vinylly-linux-x64/
          cp apps/desktop/src-tauri/icons/512x512.png release/vinylly-linux-x64/vinylly.png
          cat > release/vinylly-linux-x64/vinylly.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=Vinylly
          GenericName=Audio Collection Catalog
          Comment=Vinylly — каталог аудио-коллекции
          Exec=./vinylly %u
          Icon=vinylly
          Terminal=false
          Categories=Audio;Music;Utility;
          EOF
          cat > release/vinylly-linux-x64/README.txt <<EOF
          Vinylly for Linux
          =================

          Requirements:
            - GTK 3
            - WebKitGTK 4.1
            - librsvg2

          Run:
            chmod +x vinylly
            ./vinylly

          Or install system-wide:
            sudo desktop-file-install vinylly.desktop
            sudo cp vinylly.png /usr/share/pixmaps/
          EOF
          cd release
          tar czf ../vinylly-linux-x64.tar.gz vinylly-linux-x64
          cd ..
          rm -rf release

      - name: Upload Linux portable tarball
        uses: actions/upload-artifact@v4
        with:
          name: vinylly-linux-portable
          path: vinylly-linux-x64.tar.gz
          if-no-files-found: ignore

  desktop-windows:
    name: Build Desktop (Windows portable)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows portable binary
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_REPOSITORY: ${{ github.repository }}
          BUILD_TIMESTAMP: ${{ github.event.repository.updated_at }}
        run: pnpm --filter @vinylly/desktop build --no-bundle

      - name: Upload Windows portable binary
        uses: actions/upload-artifact@v4
        with:
          name: vinylly-windows-portable
          path: apps/desktop/src-tauri/target/release/vinylly.exe
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: [desktop-linux, desktop-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux portable tarball
        uses: actions/download-artifact@v4
        with:
          name: vinylly-linux-portable
          path: artifacts/linux

      - name: Download Windows portable binary
        uses: actions/download-artifact@v4
        with:
          name: vinylly-windows-portable
          path: artifacts/windows

      - name: Collect release assets
        run: |
          mv artifacts/linux/vinylly-linux-x64.tar.gz artifacts/vinylly-linux-x64.tar.gz
          mv artifacts/windows/vinylly.exe artifacts/vinylly-windows-x64.exe
          rm -rf artifacts/linux artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.sha }}
          name: Nightly ${{ github.sha }}
          body: |
            Автоматическая сборка коммита `${{ github.sha }}`.

            Содержит:
            - `vinylly-linux-x64.tar.gz` — portable архив для Linux (распакуйте и запустите `./vinylly`)
            - `vinylly-windows-x64.exe` — portable бинарник для Windows

            Зависимости для Linux: GTK 3, WebKitGTK 4.1, librsvg2.
          files: |
            artifacts/vinylly-linux-x64.tar.gz
            artifacts/vinylly-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
