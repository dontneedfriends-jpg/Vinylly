name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_REPOSITORY: ${{ github.repository }}
          BUILD_TIMESTAMP: ${{ github.event.repository.updated_at }}
        run: pnpm --filter @vinylly/web build

  desktop:
    name: Build Desktop
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb \
            libegl1 \
            libgl1 \
            libglu1-mesa \
            libxkbcommon0 \
            libgl1-mesa-dri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop (Linux AppImage)
        if: matrix.platform == 'ubuntu-latest'
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_REPOSITORY: ${{ github.repository }}
          BUILD_TIMESTAMP: ${{ github.event.repository.updated_at }}
          DISPLAY: :99
          WEBKIT_DISABLE_DMABUF_RENDERER: 1
          WEBKIT_DISABLE_COMPOSITING_MODE: 1
          LIBGL_ALWAYS_SOFTWARE: 1
          APPIMAGE_SKIP_GSTREAMER: 1
        run: |
          Xvfb :99 -screen 0 1280x800x24 -ac &
          XVFB_PID=$!
          sleep 3
          pnpm --filter @vinylly/desktop build
          BUILD_EXIT=$?
          kill $XVFB_PID 2>/dev/null || true
          exit $BUILD_EXIT

      - name: Build desktop (Windows portable)
        if: matrix.platform == 'windows-latest'
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_REPOSITORY: ${{ github.repository }}
          BUILD_TIMESTAMP: ${{ github.event.repository.updated_at }}
        run: pnpm --filter @vinylly/desktop build --no-bundle

      - name: Upload Linux AppImage
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vinylly-linux-appimage
          path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

      - name: Upload Windows portable binary
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vinylly-windows-portable
          path: apps/desktop/src-tauri/target/release/vinylly.exe
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: vinylly-linux-appimage
          path: artifacts/linux

      - name: Download Windows portable binary
        uses: actions/download-artifact@v4
        with:
          name: vinylly-windows-portable
          path: artifacts/windows

      - name: Collect release assets
        run: |
          mv artifacts/linux/*.AppImage artifacts/vinylly-linux-x64.AppImage
          mv artifacts/windows/vinylly.exe artifacts/vinylly-windows-x64.exe
          rm -rf artifacts/linux artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.sha }}
          name: Nightly ${{ github.sha }}
          body: |
            Автоматическая сборка коммита `${{ github.sha }}`.

            Содержит:
            - `vinylly-linux-x64.AppImage` — portable AppImage для Linux
            - `vinylly-windows-x64.exe` — portable бинарник для Windows
          files: |
            artifacts/vinylly-linux-x64.AppImage
            artifacts/vinylly-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
